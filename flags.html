<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de drapeaux | five_lives Github</title>
    <link rel="stylesheet" href="./assets/css/header.css" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
<style>
  :root{
    --accent: #0b69ff;
    --accent-transluent: #0b69ff1f;
    --accent-muted: #3e78ce;
    --muted: #9aa4b2;
    --color: #e6eef6;
    --radius: 14px;
    --border: rgba(255,255,255,0.06);
    --shadow: 0 6px 24px rgba(2,6,23,0.6);
    --input-bg: rgba(255,255,255,0.01);
    --glass: rgba(200, 200, 200, 0.159);
    /* aliases internes au générateur */
    --bg: #0d1117;
    --bg-card: #161b22;
    --ink: var(--color);
    --line: var(--border);
    --gold: #e8b84b;
    --red: #e83f3f;
    --gold-varient: #fff;
    --red-varient: #fff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
  }
  .brand-word{
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
  }

  .count-badge{
    background:var(--gold); color:#1a1300; font-weight:700;
    font-size:11px; min-width:18px; height:18px; border-radius:9px;
    display:inline-flex; align-items:center; justify-content:center; padding:0 5px;
  }
  /* Lien "Collection" dans la nav five_lives */
  #openCollection{ cursor:pointer; }

  /* ---------- FEED ---------- */
  /* --header-h : hauteur réelle du .site-header de five_lives (~50px) */
  :root{ --header-h: 50px; }
  #feed{
    height: calc(100vh - var(--header-h));
    height: calc(100dvh - var(--header-h));
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }
  #feed::-webkit-scrollbar{ display:none; }

  .card{
    height: calc(100vh - var(--header-h));
    height: calc(100dvh - var(--header-h));
    scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; padding:0 16px;
  }

  .flag-stage{
    width:100%; max-width:640px;
    aspect-ratio: 3/2;
    border-radius:14px;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px var(--line);
    background:#000;
  }
  .flag-stage svg{ display:block; width:100%; height:100%; }

  .card-meta{
    margin-top:16px; text-align:center; color:var(--muted);
    font-size:13px; letter-spacing:0.3px;
  }
  .card-meta b{ color:var(--ink); font-weight:600; }

  /* ---------- ACTIONS (style TikTok) ---------- */
  .actions{
    position:absolute; right:14px; bottom:14vh;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    z-index:5;
  }
  @media (min-width:720px){
    .actions{ right: calc(50% - 320px - 70px); bottom:50%; transform:translateY(50%); }
  }
  .act-btn{
    width:52px; height:52px; border-radius:50%;
    background:var(--glass); backdrop-filter: blur(5px);
    border:1px solid var(--line); color:black;
    font-size:22px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: transform .12s ease, background .15s ease, color .15s ease;
  }
  .act-btn:active{ transform:scale(0.88); }
  .act-btn.star-btn.active{ background:var(--gold); color:#1a1300; border-color:var(--gold); }
  .act-btn.heart-btn.active{ background:var(--red); color:#fff; border-color:var(--red); }
  .act-btn.pulse{ animation:pulse .35s ease; }
  .act-btn.text-btn{ font-size:11px; font-weight:700; letter-spacing:0.4px; }
  @keyframes pulse{ 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }

  .scroll-hint{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    color:var(--muted); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    opacity:0.8; animation:bob 1.6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0);} 50%{ transform:translate(-50%,6px);} }

  /* ---------- MODAL / COLLECTION ---------- */
  .modal{
    position:fixed; inset:0; z-index:100;
    background:rgba(10,11,14,0.88); backdrop-filter: blur(6px);
    display:flex; flex-direction:column;
  }
  .modal.hidden{ display:none; }
  .modal-header{
    display:flex; align-items:end; justify-content:space-between;
    padding:0px 22px 20px 22px; border-bottom:1px solid var(--line);
    height: 140px;
  }
  .modal-header h2{ margin:0; font-size:36px; font-weight:700; }
  .modal-action-btn{
    background:none; border:1px solid var(--line); color:var(--ink);
    width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer;
  }
  .modal-body{ overflow-y:auto; padding:22px; flex:1; }
  .collection-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:18px;
  }
  .collection-item{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .mini-flag {
    aspect-ratio: 3/2;
    background: #000;
    position: relative;
  }

  .mini-flag-name {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    white-space: nowrap;
    z-index: 2;
  }
  .mini-flag svg{ width:100%; height:100%; display:block; }
  .collection-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px;
  }
  .star-collection-active,
  .star-collection-unactive,
  .heart-collection-active,
  .heart-collection-unactive {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    border-radius: 6px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  .star-collection-unactive,
  .heart-collection-unactive {
    opacity: 0.25;
    filter: grayscale(1);
  }

  .star-collection-active,
  .heart-collection-active {
    opacity: 1;
    filter: none;
  }

  .star-collection-active:hover,
  .heart-collection-active:hover,
  .star-collection-unactive:hover,
  .heart-collection-unactive:hover {
    transform: scale(1.2);
  }
  .collection-actions{ display:flex; gap:6px; }
  button svg {
    margin: 0;
    padding: 0;
  }
  .mini-btn{
    width:24px; height:24px; border-radius:50%; border:1px solid var(--line);
    background:var(--glass); color:var(--ink); font-size:12px; cursor:pointer;
  }
  .mini-btn {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    overflow: hidden;
  }
  .mini-btn:active{ transform:scale(0.9); }
  .empty{ color:var(--muted); text-align:center; margin-top:60px; font-size:15px; }
</style>
</head>

  } else if (iconName.includes("save") || iconName.includes("download")) {

  }
}

/* ============ PALETTE & GÉNÉRATION ============ */
const PALETTE = [
  "#E74C3C", // Rouge vif
  "#3498DB", // Bleu royal
  "#F1C40F", // Jaune doré
  "#27AE60", // Vert émeraude
  "#FFFFFF", // Blanc
  "#000000", // Noir
  "#E67E22", // Orange vif
  "#9B59B6", // Violet profond
  "#1ABC9C", // Turquoise
  "#34495E", // Bleu gris foncé
  "#F39C12", // Or
  "#8E44AD"  // Bordeaux (violet)
];

const TYPE_LABELS = {
  'horizontal':'Bandes horizontales',
  'vertical':'Bandes verticales',
  'diagonal':'Diagonale',
  'cross':'Croix nordique',
  'cross-border': 'Croix nordique bordée',
  'circle':'Disque central',
  'canton-star':'Canton étoilé',
  'triangle-side':'Triangle au mât'
};

function randColor(exclude=[]){
  let c;
  do { c = PALETTE[Math.floor(Math.random()*PALETTE.length)]; }
  while (exclude.includes(c));
  return c;
}
function uid(){ return 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

let flagsNames = [];

function genererFauxNomPays() {
// Syllabes variées, incluant des sons exotiques et des caractères accentués
const syllabes = [
    "Ma", "Ri", "Ba", "Ka", "Ta", "Lo", "Zu", "Pa", "Da", "Fa", "Ga", "Ha", "Ja", "La", "Na",
    "Be", "Ce", "De", "Fe", "Ge", "He", "Ke", "Le", "Me", "Ne", "Pe", "Re", "Se", "Te",
    "Zo", "Bo", "Co", "Do", "Fo", "Go", "Jo", "Mo", "No", "Po", "Ro", "So", "To",
    "É", "È", "Ç", "À", "Ù", "Ia", "Io", "Iu", "Ea", "Eo", "Eu", "Aa", "Oo", "Uu",
    "Stan", "Vil", "Bor", "Kan", "Mar", "Sal", "Tun", "Yem", "Zim", "Ang", "Moz"
];

// Terminaisons inspirées de vrais pays
const terminaisons = [
    "istan", "land", "ville", "ia", "on", "a", "o", "u", "y", "is", "or", "al",
    "ique", "ie", "éa", "èze", "çat", "à", "ù", "ou", "ix", "ez", "an", "in"
];

// Préfixes pour ajouter du réalisme
const prefixes = ["Nord-", "Sud-", "Est-", "Ouest-", "Nouvelle-", "Grand-", "Petit-"];

    // Décider si on ajoute un préfixe (30% de chance)
    let nom = "";
    if (Math.random() < 0.3) {
        nom += prefixes[Math.floor(Math.random() * prefixes.length)];
    }

    // Choisir entre 2 et 4 syllabes
    const nombreSyllabes = Math.floor(Math.random() * 3) + 2;
    const syllabesUtilisees = new Set(); // Éviter les répétitions

    // Ajouter les syllabes
    for (let i = 0; i < nombreSyllabes; i++) {
        let syllabe;
        do {
            syllabe = syllabes[Math.floor(Math.random() * syllabes.length)];
        } while (syllabesUtilisees.has(syllabe) && i < syllabes.length - 1);
        syllabesUtilisees.add(syllabe);
        nom += syllabe;
    }

    // Ajouter une terminaison
    const terminaison = terminaisons[Math.floor(Math.random() * terminaisons.length)];
    nom += terminaison;

    // Capitaliser la première lettre de chaque partie
    nom = nom
        .split(/[- ]/)
        .map(mot => mot.charAt(0).toUpperCase() + mot.slice(1).toLowerCase())
        .join("");

    return nom;
}

function generateFlagDef(){
  const types = Object.keys(TYPE_LABELS);
  const type = types[Math.floor(Math.random()*types.length)];
  let name = genererFauxNomPays();
  while (name in flagsNames) {
    name = genererFauxNomPays();
  }
  flagsNames.push(name);
  const def = { id: name, type };

  switch(type){
    case 'horizontal':
    case 'vertical': {
      let n = Math.random();
      if (n<1/3){n=4}
      else if (n<2/3){n=2}
      else {n=3}
      const colors = []; let last=null;
      for(let i=0;i<n;i++){ const c = randColor(last?[last]:[]); colors.push(c); last=c; }
      def.colors = colors;
      break;
    }
    case 'diagonal': {
      const c1 = randColor(), c2 = randColor([c1]);
      def.colors = [c1,c2];
      def.dir = Math.random()<0.5 ? 'tl-br' : 'tr-bl';
      break;
    }
    case 'cross': {
      const c1 = randColor(), c2 = randColor([c1]);
      def.colors = [c1,c2];
      def.offsetX = [0.33, 0.33, 0.67][Math.floor(Math.random()*3)];
      break;
    }
    case 'cross-border': {
      const c1 = randColor(), c2 = randColor([c1]), c3 = randColor([c1,c2]);
      def.colors = [c1, c2, c3]; // fond, contour, croix
      def.offsetX = [0.33, 0.33, 0.67][Math.floor(Math.random()*3)];
      break;
    }
    case 'circle': {
      const c1 = randColor(), c2 = randColor([c1]);
      def.colors = [c1,c2];
      def.cx = [0.28, 0.5, 0.72][Math.floor(Math.random()*3)]; // gauche, centre, droite
      def.r  = [0.18, 0.24, 0.30][Math.floor(Math.random()*3)]; // petit, moyen, grand
      break;
    }
    case 'canton-star': {
      const c1=randColor(), c2=randColor([c1]), c3=randColor([c1,c2]);
      const c4 = Math.random()<0.5 ? '#FFFFFF' : randColor([c1,c2,c3]);
      def.colors=[c1,c2,c3,c4];
      def.stripes = Math.random()<0.5 ? 3 : 5;
      def.starCount = 1 + Math.floor(Math.random()*3);
      break;
    }
    case 'triangle-side': {
      const c1=randColor(), c2=randColor([c1]), c3=randColor([c1,c2]);
      const c4 = Math.random()<0.6 ? '#FFFFFF' : randColor([c1,c2,c3]);
      def.colors=[c1,c2,c3,c4];
      def.withStar = Math.random()<0.6;
      break;
    }
  }
  return def;
}

function starPoints(cx,cy,rOuter,rInner,points=5,rotationDeg=-90){
  const step = Math.PI/points;
  let angle = rotationDeg*Math.PI/180;
  const pts=[];
  for(let i=0;i<points*2;i++){
    const r = i%2===0 ? rOuter : rInner;
    pts.push(`${(cx+r*Math.cos(angle)).toFixed(2)},${(cy+r*Math.sin(angle)).toFixed(2)}`);
    angle += step;
  }
  return pts.join(' ');
}

function renderFlagSVG(def, w=600, h=400){
  let inner='';
  switch(def.type){
    case 'horizontal': {
      const n=def.colors.length, sh=h/n;
      inner = def.colors.map((c,i)=>`<rect x="0" y="${i*sh}" width="${w}" height="${sh}" fill="${c}"/>`).join('');
      break;
    }
    case 'vertical': {
      const n=def.colors.length, sw=w/n;
      inner = def.colors.map((c,i)=>`<rect x="${i*sw}" y="0" width="${sw}" height="${h}" fill="${c}"/>`).join('');
      break;
    }
    case 'diagonal': {
      const [c1,c2]=def.colors;
      const pts = def.dir==='tl-br' ? `0,0 ${w},0 0,${h}` : `${w},0 ${w},${h} 0,0`;
      inner = `<rect width="${w}" height="${h}" fill="${c1}"/><polygon points="${pts}" fill="${c2}"/>`;
      break;
    }
    case 'cross': {
      const [c1,c2]=def.colors;
      const barH=h*0.22, barW=w*0.16, vx=w*def.offsetX;
      inner = `<rect width="${w}" height="${h}" fill="${c1}"/>
        <rect x="0" y="${h/2-barH/2}" width="${w}" height="${barH}" fill="${c2}"/>
        <rect x="${vx-barW/2}" y="0" width="${barW}" height="${h}" fill="${c2}"/>`;
      break;
    }
    case 'cross-border': {
      const [c1, c2, c3] = def.colors;
      const barH = h * 0.22, barW = w * 0.14, vx = w * def.offsetX;
      const borderH = barH + h * 0.08, borderW = barW + w * 0.05;
      inner = `<rect width="${w}" height="${h}" fill="${c1}"/>
        <rect x="0" y="${h/2 - borderH/2}" width="${w}" height="${borderH}" fill="${c2}"/>
        <rect x="${vx - borderW/2}" y="0" width="${borderW}" height="${h}" fill="${c2}"/>
        <rect x="0" y="${h/2 - barH/2}" width="${w}" height="${barH}" fill="${c3}"/>
        <rect x="${vx - barW/2}" y="0" width="${barW}" height="${h}" fill="${c3}"/>`;
      break;
    }
    case 'circle': {
      const [c1,c2]=def.colors;
      const cx=w*def.cx, cy=h/2, r=h*def.r;
      inner = `<rect width="${w}" height="${h}" fill="${c1}"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="${c2}"/>`;
      break;
    }
    case 'canton-star': {
      const [c1,c2,c3,c4]=def.colors;
      const n=def.stripes, sh=h/n;
      let stripes='';
      for(let i=0;i<n;i++) stripes += `<rect x="0" y="${i*sh}" width="${w}" height="${sh}" fill="${i%2===0?c1:c2}"/>`;
      const cw=w*0.42, ch=h*0.55;
      let stars='';
      const sc=def.starCount;
      for(let i=0;i<sc;i++){
        const denom = Math.max(sc-1,1);
        const scx = cw*(0.22 + (sc>1 ? (i*(0.56/denom)) : 0.28));
        const scy = ch*0.5;
        stars += `<polygon points="${starPoints(scx,scy,ch*0.17,ch*0.065)}" fill="${c4}"/>`;
      }
      inner = stripes + `<rect x="0" y="0" width="${cw}" height="${ch}" fill="${c3}"/>` + stars;
      break;
    }
    case 'triangle-side': {
      const [c1,c2,c3,c4]=def.colors;
      const sh=h/2;
      let stripes = `<rect x="0" y="0" width="${w}" height="${sh}" fill="${c1}"/><rect x="0" y="${sh}" width="${w}" height="${sh}" fill="${c2}"/>`;
      const triW=w*0.38;
      const tri = `<polygon points="0,0 ${triW},${h/2} 0,${h}" fill="${c3}"/>`;
      let star='';
      if(def.withStar) star = `<polygon points="${starPoints(triW*0.4,h/2,h*0.13,h*0.05)}" fill="${c4}"/>`;
      inner = stripes + tri + star;
      break;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${inner}</svg>`;
}

/* ============ STOCKAGE (favoris / j'aime) ============ */
function loadStore(key){
  try { return JSON.parse(localStorage.getItem(key) || '{}'); }
  catch(e){ return {}; }
}
function saveStore(key,obj){ localStorage.setItem(key, JSON.stringify(obj)); }

let favorites = loadStore('flags_favorites');
let likes = loadStore('flags_likes');

function updateCollectionBadge(){
  const ids = new Set([...Object.keys(favorites), ...Object.keys(likes)]);
  document.getElementById('collectionCount').textContent = ids.size;
}

/* ============ EXPORT : télécharger / imprimer ============ */
function downloadFlag(def){
  const w=1200, h=800;
  const svgStr = renderFlagSVG(def, w, h);
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob2=>{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob2);
      a.download = `drapeau-${def.id}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  };
  img.src = url;
}

function downloadFlagSVG(def){
  const svgStr = renderFlagSVG(def, 1200, 800);
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `drapeau-${def.id}.svg`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function printFlag(def){
  const svgStr = renderFlagSVG(def, 1200, 800);
  const w = window.open('', '_blank', 'width=900,height=650');
  if(!w){ alert("Le navigateur a bloqué l'ouverture de la fenêtre d'impression."); return; }
  w.document.write(`<!DOCTYPE html><html><head><title>Imprimer — ${def.id}</title>
    <style>
      html,body{margin:0;height:100%;display:flex;align-items:center;justify-content:center;background:#fff;}
      svg{width:90vw;max-width:900px;height:auto;}
      @media print{ body{ height:auto; } }
    </style></head><body>${svgStr}</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>{ w.print(); }, 300);
}

/* ============ FEED (scroll infini façon TikTok) ============ */
const feed = document.getElementById('feed');

function pulse(el){
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');
}

function createCard(def, isFirst){
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = def.id;

  card.innerHTML = `
    <div class="flag-stage">${renderFlagSVG(def)}</div>
    <div class="card-meta">Type&nbsp;: <b>${TYPE_LABELS[def.type]}</b></div>
    <div class="card-meta">${def.id}</div>
    <div class="actions">
      <button class="act-btn star-btn" title="Ajouter aux favoris">${icon("fav", 16)}</button>
      <button class="act-btn heart-btn" title="J'aime">${icon("like", 16)}</button>
      <button class="act-btn text-btn dl-btn" title="Télécharger en PNG">${icon("save")} PNG</button>
      <button class="act-btn text-btn svg-btn" title="Télécharger en SVG">${icon("save")} SVG</button>
      <button class="act-btn print-btn" title="Imprimer">${icon("print")}</button>
    </div>
    
    ${isFirst ? '<div class="scroll-hint">▲ scrollez ▼</div>' : ''}
  `;

  const starBtn = card.querySelector('.star-btn');
  const heartBtn = card.querySelector('.heart-btn');
  const dlBtn = card.querySelector('.dl-btn');
  const svgBtn = card.querySelector('.svg-btn');
  const printBtn = card.querySelector('.print-btn');

  function refresh(){
    starBtn.classList.toggle('active', !!favorites[def.id]);
    heartBtn.classList.toggle('active', !!likes[def.id]);
  }
  refresh();

  starBtn.addEventListener('click', ()=>{
    if(favorites[def.id]) delete favorites[def.id];
    else favorites[def.id] = def;
    saveStore('flags_favorites', favorites);
    refresh(); pulse(starBtn); updateCollectionBadge();
  });

  heartBtn.addEventListener('click', ()=>{
    if(likes[def.id]) delete likes[def.id];
    else likes[def.id] = def;
    saveStore('flags_likes', likes);
    refresh(); pulse(heartBtn); updateCollectionBadge();
  });

  dlBtn.addEventListener('click', ()=> downloadFlag(def));
  svgBtn.addEventListener('click', ()=> downloadFlagSVG(def));
  printBtn.addEventListener('click', ()=> printFlag(def));

  card.refreshButtons = refresh;
  return card;
}

function appendFlags(count=4){
  for(let i=0;i<count;i++){
    const def = generateFlagDef();
    feed.appendChild(createCard(def, feed.children.length===0));
  }
}

appendFlags(6);

feed.addEventListener('scroll', ()=>{
  if(feed.scrollTop + feed.clientHeight > feed.scrollHeight - window.innerHeight*2){
    appendFlags(4);
  }
});

/* ============ COLLECTION (favoris + j'aime) ============ */
const collectionModal = document.getElementById('collectionModal');
const collectionGrid = document.getElementById('collectionGrid');

function openCollection(){
  favorites = loadStore('flags_favorites');
  likes = loadStore('flags_likes');
  const ids = new Set([...Object.keys(favorites), ...Object.keys(likes)]);
  collectionGrid.innerHTML = '';

  if(ids.size === 0){
    collectionGrid.innerHTML = `<p class="empty">Aucun drapeau favori ou aimé pour l\'instant.<br>Touchez ${icon("fav", 16)} ou ${icon("like", 16)} sur un drapeau du fil pour le garder ici.</p>`;
  } else {
    ids.forEach(id=>{
      const def = favorites[id] || likes[id];
      const item = document.createElement('div');
      item.className = 'collection-item';
      item.innerHTML = `
        <div class="mini-flag">
          <div class="mini-flag-name">${id}</div>
          ${renderFlagSVG(def, 300, 200)}
        </div>
        <div class="collection-row">
          <div class="collection-badges">
            <button id="star" class="${favorites[id] ? 'star-collection-active' : 'star-collection-unactive'}">${icon("fav", 16)}</button>
            <button id="heart" class="${likes[id] ? 'heart-collection-active' : 'heart-collection-unactive'}">${icon("like", 16)}</button>
          </div>
          <div class="collection-actions">
            <button class="mini-btn json-mini" title="Copier le contenu JSON" style="font-size:6px;font-weight:500;">${icon("save", 12)} JSON</button>
            <button class="mini-btn dl-mini" title="Télécharger en PNG" style="font-size:6px;font-weight:500;">${icon("save", 12)} PNG</button>
            <button class="mini-btn svg-mini" title="Télécharger en SVG" style="font-size:6px;font-weight:500;">${icon("save", 12)} SVG</button>
            <button class="mini-btn pr-mini" title="Imprimer">${icon("print", 16)}</button>
            <button class="mini-btn rm-mini" title="Retirer">✕</button>
          </div>
        </div>
      `;
      item.querySelector('.dl-mini').addEventListener('click', ()=> downloadFlag(def));
      item.querySelector('.svg-mini').addEventListener('click', ()=> downloadFlagSVG(def));
      item.querySelector('.pr-mini').addEventListener('click', ()=> printFlag(def));
      item.querySelector('.rm-mini').addEventListener('click', ()=>{
        delete favorites[id]; delete likes[id];
        saveStore('flags_favorites', favorites);
        saveStore('flags_likes', likes);
        const cardInFeed = feed.querySelector(`.card[data-id="${id}"]`);
        if(cardInFeed && cardInFeed.refreshButtons) cardInFeed.refreshButtons();
        updateCollectionBadge();
        openCollection();
      });
      item.querySelector('.json-mini').addEventListener('click', () => {
        navigator.clipboard.writeText(JSON.stringify(def));
      });
      const starBtn = item.querySelector('#star');
      const heartBtn = item.querySelector('#heart');

      starBtn.addEventListener('click', () => {
        if (favorites[id]) delete favorites[id];
        else favorites[id] = def;
        saveStore('flags_favorites', favorites);
        starBtn.className = favorites[id] ? 'star-collection-active' : 'star-collection-unactive';

        // Sync le bouton dans le feed si la carte est visible
        const cardInFeed = feed.querySelector(`.card[data-id="${id}"]`);
        if (cardInFeed?.refreshButtons) cardInFeed.refreshButtons();

        // Supprime de la liste si plus aucun des deux
        if (!favorites[id] && !likes[id]) {
          updateCollectionBadge();
          item.remove();
        } else {
          updateCollectionBadge();
        }
      });

      heartBtn.addEventListener('click', () => {
        if (likes[id]) delete likes[id];
        else likes[id] = def;
        saveStore('flags_likes', likes);
        heartBtn.className = likes[id] ? 'heart-collection-active' : 'heart-collection-unactive';

        const cardInFeed = feed.querySelector(`.card[data-id="${id}"]`);
        if (cardInFeed?.refreshButtons) cardInFeed.refreshButtons();

        if (!favorites[id] && !likes[id]) {
          updateCollectionBadge();
          item.remove();
        } else {
          updateCollectionBadge();
        }
      });
      collectionGrid.appendChild(item);
    });
  }
  collectionModal.classList.remove('hidden');
}

document.getElementById('devlopperNewFavorite').addEventListener('click', () => {
  const raw = prompt('Colle la définition du drapeau (JSON) :');
  if (!raw) return; // Annuler ou vide

  let def;
  try {
    def = JSON.parse(raw.trim());
  } catch (e) {
    alert('JSON invalide.');
    return;
  }

  if (!def.id || !def.type || !def.colors) {
    alert('Définition incomplète (id, type et colors requis).');
    return;
  }

  favorites[def.id] = def;
  saveStore('flags_favorites', favorites);
  updateCollectionBadge();
  openCollection(); // recharge la grille
});

/* Le header five_lives est injecté via innerHTML APRÈS ce script,
   donc on écoute sur document en délégation — fonctionne dans les deux cas
   (header injecté ou déjà présent). */
document.addEventListener('click', e => {
  const btn = e.target.closest('#openCollection');
  if(btn){ e.preventDefault(); openCollection(); }
});
document.getElementById('closeCollection').addEventListener('click', ()=> collectionModal.classList.add('hidden'));

/* Mesure la hauteur réelle du header après injection et ajuste --header-h */
function syncHeaderHeight(){
  const h = document.querySelector('.site-header');
  if(h) document.documentElement.style.setProperty('--header-h', h.offsetHeight + 'px');
}
/* Tente immédiatement, puis après un tick (au cas où le header est injecté en JS) */
syncHeaderHeight();
setTimeout(syncHeaderHeight, 0);

updateCollectionBadge();
</script>
